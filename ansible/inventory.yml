# Inventaire — cluster MyApp k3s
# backend-vm : master (réseau interne), frontend-vm : worker (IP publique)
# Accès backend : ProxyJump via frontend
all:
  vars:
    ansible_user: hodeconlimited
    ansible_ssh_private_key_file: "~/.ssh/myapp_vms"
  children:
    k3s_server:
      hosts:
        backend-vm:
          ansible_host: 10.0.0.11
          ansible_ssh_common_args: '-o ProxyCommand="ssh -W %h:%p -i ~/.ssh/myapp_vms hodeconlimited@203.0.113.11"'
    k3s_agents:
      hosts:
        frontend-vm:
          ansible_host: 203.0.113.11  # IP publique (accès direct)
