# Inventory — MyApp k3s cluster (3 VMs)
# backend-vm: k3s server (control-plane), internal IP 10.0.0.11 — access via ProxyJump
# frontend-vm: k3s agent, public IP 203.0.113.11 (jumphost for SSH)
# backend2:    k3s agent, internal IP 10.0.0.13 — access via ProxyJump
#
# DNS: dev.example.com → A record to 203.0.113.11
---
all:
  vars:
    ansible_user: hodeconlimited
    ansible_ssh_private_key_file: "~/.ssh/myapp_vms"
  children:
    k3s_server:
      hosts:
        backend-vm:
          ansible_host: 10.0.0.11
          ansible_ssh_common_args: '-o ProxyCommand="ssh -W %h:%p -i ~/.ssh/myapp_vms hodeconlimited@203.0.113.11"'
    k3s_agents:
      hosts:
        frontend-vm:
          ansible_host: 203.0.113.11
        backend2:
          ansible_host: 10.0.0.13
          ansible_ssh_common_args: '-o ProxyCommand="ssh -W %h:%p -i ~/.ssh/myapp_vms hodeconlimited@203.0.113.11"'
    # Only frontend-vm has public IP; use as jumphost
    jumphost:
      hosts:
        frontend-vm:
