# Inventory — MyApp k3s cluster (3 VMs)
# Source of truth for infra is now terraform/ .
# Internal IP plan:
# - backend-vm  = 10.0.0.11
# - frontend-vm = 10.0.0.12
# - backend2    = 10.0.0.13
#
# Only frontend-vm has a public IP. Update FRONTEND_PUBLIC_IP from:
#   terraform output -raw frontend_public_ip
---
all:
  vars:
    ansible_user: myapp
    ansible_ssh_private_key_file: "~/.ssh/myapp_vms"
    frontend_public_ip: "REPLACE_WITH_FRONTEND_PUBLIC_IP"
  children:
    k3s_server:
      hosts:
        backend-vm:
          ansible_host: 10.0.0.11
          ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o GlobalKnownHostsFile=/dev/null -o ProxyCommand="ssh -W %h:%p -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o GlobalKnownHostsFile=/dev/null -i ~/.ssh/myapp_vms myapp@REPLACE_WITH_FRONTEND_PUBLIC_IP"'
    k3s_agents:
      hosts:
        frontend-vm:
          ansible_host: REPLACE_WITH_FRONTEND_PUBLIC_IP
        backend2:
          ansible_host: 10.0.0.13
          ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o GlobalKnownHostsFile=/dev/null -o ProxyCommand="ssh -W %h:%p -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o GlobalKnownHostsFile=/dev/null -i ~/.ssh/myapp_vms myapp@REPLACE_WITH_FRONTEND_PUBLIC_IP"'
    # Only frontend-vm has public IP; use as jumphost
    jumphost:
      hosts:
        frontend-vm:
