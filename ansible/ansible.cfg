# ansible/ansible.cfg

[defaults]
# Inventory location — points to our generated inventory
inventory           = inventory/inventory.yml

# Do not create .retry files on failure — keeps repo clean
retry_files_enabled = False

# SSH connection timeout in seconds
timeout             = 30

# Disable host key checking — nodes are freshly provisioned
# by Terraform and we trust them
# In production with long-lived nodes this should be True
host_key_checking   = False

# Show task execution time — helps identify slow tasks
callback_whitelist  = timer, profile_tasks

# Number of parallel connections — we have 3 nodes so 3 is enough
forks               = 3

# Reduce SSH output noise
display_skipped_hosts = False

# Log all runs to a file for debugging
log_path            = /tmp/ansible-myapp.log

[ssh_connection]
# SSH multiplexing — reuses the same SSH connection for all tasks
# on a node instead of opening a new one each time
# Makes playbook runs significantly faster
ssh_args            = -o ControlMaster=auto -o ControlPersist=30m -o ForwardAgent=no -o StrictHostKeyChecking=no

# Use SSH pipelining — sends multiple commands over one connection
# Requires requiretty to be disabled in sudoers (we handle this in preflight)
pipelining          = True

[privilege_escalation]
# All tasks that need root will use sudo
become              = False
become_method       = sudo
become_user         = root