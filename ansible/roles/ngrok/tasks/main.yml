---
# Rôle ngrok — Installer et démarrer ngrok sur frontend-vm
# Expose les ports 80/443 (Traefik) vers un domaine ngrok public
# Après démarrage : récupérer l'URL via API locale http://127.0.0.1:4040/api/tunnels

- name: Add ngrok GPG key
  ansible.builtin.get_url:
    url: https://ngrok-agent.s3.amazonaws.com/ngrok.asc
    dest: /etc/apt/trusted.gpg.d/ngrok.asc
    mode: "0644"
  become: true

- name: Add ngrok apt repository
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list.d/ngrok.list
    line: "deb https://ngrok-agent.s3.amazonaws.com bookworm main"
    create: true
    mode: "0644"
  become: true

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
  become: true
  when: ansible_os_family == "Debian"

- name: Install ngrok package
  ansible.builtin.apt:
    name: ngrok
    state: present
  become: true

# Authtoken requis (group_vars/k3s_agents.yml ou -e ngrok_authtoken=xxx)
- name: Fail if ngrok_authtoken not set
  ansible.builtin.fail:
    msg: "ngrok_authtoken must be set. Create group_vars/k3s_agents.yml with ngrok_authtoken: your_token"
  when: not ngrok_authtoken is defined or ngrok_authtoken | length == 0

- name: Create ngrok config directory
  ansible.builtin.file:
    path: /root/.config/ngrok
    state: directory
    mode: "0700"
  become: true

- name: Configure ngrok authtoken
  ansible.builtin.template:
    src: ngrok.yml.j2
    dest: /root/.config/ngrok/ngrok.yml
    mode: "0600"
  become: true
  when: ngrok_authtoken is defined and ngrok_authtoken | length > 0

- name: Create ngrok systemd service
  ansible.builtin.template:
    src: ngrok.service.j2
    dest: /etc/systemd/system/ngrok.service
  become: true

- name: Enable and start ngrok
  ansible.builtin.systemd:
    name: ngrok
    state: started
    enabled: true
    daemon_reload: true
  become: true
