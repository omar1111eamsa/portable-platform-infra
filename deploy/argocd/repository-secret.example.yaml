# deploy/argocd/repository-secret.example.yaml
#
# If the repository is private, ArgoCD needs credentials to clone it
# Copy to repository-secret.yaml, fill in values, and apply:
#   kubectl apply -f deploy/argocd/repository-secret.yaml
#
# NEVER commit repository-secret.yaml to git

apiVersion: v1
kind: Secret
metadata:
  name: myapp-repo-secret
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  url: https://github.com/MyApp/portable-platform-infra
  # GitHub personal access token with repo read access
  password: your-github-pat-here
  username: your-github-username
