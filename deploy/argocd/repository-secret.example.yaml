# Copy to a local file, replace REPLACE_WITH_GITHUB_PAT, then:
#   kubectl apply -f repository-secret.yaml
#
# GitHub returns "Repository not found" for private repos without auth (same as your ComparisonError).
# PAT: classic token with scope "repo", or fine-grained with read on this repository.
apiVersion: v1
kind: Secret
metadata:
  name: repo-portable-platform-infra
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  name: portable-platform-infra
  type: git
  url: https://github.com/MyApp/portable-platform-infra.git
  # GitHub HTTPS + PAT: use this username (not "git") or GitHub returns "Password authentication is not supported".
  username: x-access-token
  password: REPLACE_WITH_GITHUB_PAT
