apiVersion: apps/v1
kind: Deployment
metadata:
  name: consul
  namespace: myapp
  labels:
    app: consul
spec:
  replicas: 2
  selector:
    matchLabels:
      app: consul
  template:
    metadata:
      labels:
        app: consul
    spec:
      containers:
        - name: consul
          image: hashicorp/consul:1.17
          args:
            - agent
            - -server
            - -bootstrap-expect=2
            - -retry-join=consul.myapp.svc.cluster.local
            - -ui
            - -client=0.0.0.0
            - -data-dir=/consul/data
          ports:
            - containerPort: 8500
              name: http
            - containerPort: 8600
              protocol: UDP
              name: dns
          resources:
            requests:
              memory: "384Mi"
              cpu: "100m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          startupProbe:
            exec:
              command:
                - consul
                - info
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 10
            failureThreshold: 30
          livenessProbe:
            exec:
              command:
                - consul
                - info
            initialDelaySeconds: 0
            periodSeconds: 15
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - consul
                - info
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 10
