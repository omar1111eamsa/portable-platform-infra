apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init-airflow-logs
  namespace: myapp
  labels:
    app: minio
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: minio
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      containers:
        - name: mc
          image: minio/mc:RELEASE.2026-02-21T16-00-46Z
          envFrom:
            - secretRef:
                name: minio-credentials
          command:
            - sh
            - -c
            - |
              set -eu
              until mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                echo "waiting for minio"
                sleep 3
              done
              mc mb --ignore-existing "local/${AIRFLOW_LOGS_BUCKET}"
