# deploy/k8s/infra/minio/deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: myapp
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: object-storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  strategy:
    # Recreate — MinIO single node cannot have two
    # instances writing to the same PVC simultaneously
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/component: object-storage
    spec:
      # Run on worker-02 alongside other infra services
      nodeSelector:
        kubernetes.io/hostname: myapp-worker-02

      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
        - name: minio
          image: minio/minio:latest
          command:
            - minio
            - server
            - /data
            # Enable MinIO console on port 9001
            - --console-address
            - ":9001"
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console

          # ── Environment ───────────────────────────────
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_PASSWORD
            # Enable Prometheus metrics
            - name: MINIO_PROMETHEUS_AUTH_TYPE
              value: "public"

          # ── Resources ─────────────────────────────────
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

          # ── Probes ────────────────────────────────────
          # Readiness — is MinIO API ready?
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          # Liveness — is MinIO still alive?
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3

          volumeMounts:
            - name: minio-data
              mountPath: /data

      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: minio-pvc