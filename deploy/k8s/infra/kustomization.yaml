apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: myapp

resources:
  # postgres-credentials: créer manuellement (voir DEPLOYMENT.md)
  - postgres/pvc.yaml
  - postgres/deployment.yaml
  - postgres/service.yaml
  - postgres/init-databases-job.yaml
  # minio-credentials: créer manuellement (voir DEPLOYMENT.md)
  - minio/pvc.yaml
  - minio/deployment.yaml
