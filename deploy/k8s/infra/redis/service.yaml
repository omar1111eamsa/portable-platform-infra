# deploy/k8s/infra/redis/service.yaml

apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: myapp
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
spec:
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
  # ClusterIP — only accessible within the cluster
  # Redis must never be exposed externally
  type: ClusterIP