# deploy/k8s/infra/monitoring/grafana-deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: myapp
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/component: monitoring
    spec:
      nodeSelector:
        kubernetes.io/hostname: myapp-worker-01

      securityContext:
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472

      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
              name: http

          # ── Environment ───────────────────────────────
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-credentials
                  key: GF_SECURITY_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-credentials
                  key: GF_SECURITY_ADMIN_PASSWORD
            # Serve Grafana under /grafana path
            - name: GF_SERVER_ROOT_URL
              value: "https://dev.example.com/grafana"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
            # Disable telemetry reporting to Grafana Labs
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
            - name: GF_ANALYTICS_CHECK_FOR_UPDATES
              value: "false"

          # ── Resources ─────────────────────────────────
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ── Probes ────────────────────────────────────
          readinessProbe:
            httpGet:
              path: /grafana/api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /grafana/api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5

          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources

      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources