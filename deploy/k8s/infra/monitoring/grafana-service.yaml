# deploy/k8s/infra/monitoring/grafana-service.yaml

apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: myapp
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
spec:
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
  type: ClusterIP