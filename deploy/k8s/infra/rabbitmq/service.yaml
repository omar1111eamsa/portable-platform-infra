# deploy/k8s/infra/rabbitmq/service.yaml

apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: myapp
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/component: message-broker
spec:
  selector:
    app.kubernetes.io/name: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: amqp
    - name: management
      port: 15672
      targetPort: management
    - name: prometheus
      port: 15692
      targetPort: prometheus
  type: ClusterIP