# Root Kustomization — pour ArgoCD
# Mode maintenance : uniquement base + cronjobs (clean-disk, clean-evicted) + argocd
# Pour réactiver apps/infra : remettre infra et apps dans resources puis push
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - base
  - cert-manager
  - infra
  - apps
  - network-policies
  - cronjobs  # clean-disk-backend, clean-disk-frontend, clean-evicted-pods
  - argocd
