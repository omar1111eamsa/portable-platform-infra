# Ingress ArgoCD — accès UI via dev.example.com
# URL: https://dev.example.com/argocd
# Prérequis: appliquer le patch ArgoCD (voir README.md)
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "250"
spec:
  ingressClassName: traefik
  rules:
    - host: "dev.example.com"
      http:
        paths:
          - path: /argocd
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
    - http:
        paths:
          - path: /argocd
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
