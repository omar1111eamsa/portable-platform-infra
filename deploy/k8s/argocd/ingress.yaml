# Ingress ArgoCD — accès UI via dev.example.com
# URL: https://dev.example.com/argocd
# Prérequis: appliquer le patch ArgoCD (voir README.md)
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "250"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - "dev.example.com"
      secretName: dev-myapp-io-argocd-tls
  rules:
    - host: "dev.example.com"
      http:
        paths:
          - path: /argocd
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
