# Argo CD control plane + Ingress (Traefik).
# install.yaml is vendored (v2.14.10+) so `kubectl apply -k` works without fetching GitHub (TLS/proxy safe).
# v2.14.10 fixes /argocd/argocd/... redirect after admin login (github.com/argoproj/argo-cd/issues/20790).
# To upgrade: replace install.yaml from https://github.com/argoproj/argo-cd/releases
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - namespace.yaml
  - install.yaml
  - ingress.yaml
  - ingress-ip.yaml

patches:
  # Upstream argocd-server ClusterRole omits list/watch on * — UI cannot list pods / build resource tree.
  - path: argocd-server-clusterrole-list-patch.json
    target:
      kind: ClusterRole
      name: argocd-server
  # Upstream ConfigMap has no namespace field; match by name only (works with namespace transformer).
  - path: argocd-cmd-params-patch.yaml
    target:
      kind: ConfigMap
      name: argocd-cmd-params-cm
      version: v1
