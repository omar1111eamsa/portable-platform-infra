# RBAC pour le CronJob de nettoyage des pods evicted
# Permet de lister et supprimer les pods en statut Failed
apiVersion: v1
kind: ServiceAccount
metadata:
  name: clean-evicted-pods
  namespace: myapp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: clean-evicted-pods
  namespace: myapp
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "delete", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: clean-evicted-pods
  namespace: myapp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: clean-evicted-pods
subjects:
  - kind: ServiceAccount
    name: clean-evicted-pods
    namespace: myapp
