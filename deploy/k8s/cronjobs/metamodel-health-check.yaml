apiVersion: batch/v1
kind: CronJob
metadata:
  name: metamodel-health-check
  namespace: myapp
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 120
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 180
      ttlSecondsAfterFinished: 600
      template:
        spec:
          serviceAccountName: metamodel-health-check
          restartPolicy: Never
          nodeSelector:
            kubernetes.io/hostname: backend2
          containers:
            - name: check
              image: bitnami/kubectl:1.34.1
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ec
                - |
                  set -eu

                  POD="$(kubectl -n myapp get pod -l app=metamodel-orchestration -o jsonpath='{.items[0].metadata.name}')"
                  [ -n "${POD}" ] || { echo "metamodel-orchestration pod not found"; exit 1; }

                  HEALTH=""
                  for i in 1 2 3 4 5; do
                    if HEALTH="$(kubectl -n myapp exec "${POD}" -- python -c 'import urllib.request;print(urllib.request.urlopen("http://127.0.0.1:8080/api/v2/monitor/health", timeout=10).read().decode())' 2>/dev/null)"; then
                      break
                    fi
                    echo "health endpoint attempt ${i} failed, retrying..."
                    sleep 5
                  done
                  [ -n "${HEALTH}" ] || { echo "health endpoint unavailable after retries"; exit 1; }
                  echo "health=${HEALTH}"

                  echo "${HEALTH}" | grep -q '"metadatabase":{"status":"healthy"}'
                  echo "${HEALTH}" | grep -q '"scheduler":{"status":"healthy"'
                  echo "${HEALTH}" | grep -q '"triggerer":{"status":"healthy"'
                  echo "${HEALTH}" | grep -q '"dag_processor":{"status":"healthy"'
