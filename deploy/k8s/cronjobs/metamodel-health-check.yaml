apiVersion: batch/v1
kind: CronJob
metadata:
  name: metamodel-health-check
  namespace: myapp
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          serviceAccountName: metamodel-health-check
          restartPolicy: Never
          containers:
            - name: check
              image: bitnami/kubectl:latest
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ec
                - |
                  set -eu

                  HEALTH=""
                  for i in 1 2 3 4 5; do
                    if HEALTH="$(kubectl get --raw '/api/v1/namespaces/myapp/services/http:metamodel-orchestration:8080/proxy/api/v2/monitor/health' 2>/dev/null)"; then
                      break
                    fi
                    echo "health endpoint attempt ${i} failed, retrying..."
                    sleep 5
                  done
                  [ -n "${HEALTH}" ] || { echo "health endpoint unavailable after retries"; exit 1; }
                  echo "health=${HEALTH}"

                  echo "${HEALTH}" | grep -q '"metadatabase":{"status":"healthy"}'
                  echo "${HEALTH}" | grep -q '"scheduler":{"status":"healthy"'
                  echo "${HEALTH}" | grep -q '"triggerer":{"status":"healthy"'
                  echo "${HEALTH}" | grep -q '"dag_processor":{"status":"healthy"'

                  for d in metamodel-orchestration metamodel-scheduler metamodel-dag-processor metamodel-worker metamodel-triggerer; do
                    desired="$(kubectl -n myapp get deploy "${d}" -o jsonpath='{.spec.replicas}')"
                    ready="$(kubectl -n myapp get deploy "${d}" -o jsonpath='{.status.readyReplicas}')"
                    desired="${desired:-1}"
                    ready="${ready:-0}"
                    echo "${d}: ready=${ready} desired=${desired}"
                    [ "${ready}" -ge "${desired}" ] || { echo "deployment ${d} not ready"; exit 1; }
                  done
