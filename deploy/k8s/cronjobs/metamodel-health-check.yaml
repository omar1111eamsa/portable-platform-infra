apiVersion: batch/v1
kind: CronJob
metadata:
  name: metamodel-health-check
  namespace: myapp
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 120
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 180
      ttlSecondsAfterFinished: 600
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: check
              image: python:3.12-alpine
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ec
                - |
                  set -eu

                  python - <<'PY'
                  import json
                  import time
                  import urllib.request

                  url = "http://metamodel-orchestration.myapp.svc.cluster.local:8080/api/v2/monitor/health"
                  health = None

                  for attempt in range(1, 11):
                      try:
                          with urllib.request.urlopen(url, timeout=10) as response:
                              health = json.loads(response.read().decode())
                              break
                      except Exception as exc:
                          print(f"health endpoint attempt {attempt} failed: {exc}")
                          time.sleep(10)

                  if health is None:
                      raise SystemExit("health endpoint unavailable after retries")

                  print(f"health={json.dumps(health, separators=(',', ':'))}")

                  required = ("metadatabase", "scheduler", "triggerer", "dag_processor")
                  bad = [name for name in required if health.get(name, {}).get("status") != "healthy"]
                  if bad:
                      raise SystemExit(f"unhealthy components: {', '.join(bad)}")
                  PY
