# Allow api-gateway to reach all backend services
# api-gateway is the only entry point to backend services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-backends
  namespace: myapp
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - user-management
          - predictions-intake
          - payment-service
          - chatbot
          - kpi-dashboard
          - crm-client
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
