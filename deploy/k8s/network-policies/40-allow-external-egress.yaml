apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-selected-external-egress
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - user-management
          - payment-service
          - chatbot
          - metamodel-orchestration
          - metamodel-scheduler
          - metamodel-dag-processor
          - execution-engine
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 465
        - protocol: TCP
          port: 587

