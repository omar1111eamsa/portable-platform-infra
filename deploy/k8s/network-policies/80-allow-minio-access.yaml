# Allow Airflow components to reach MinIO for log storage
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-minio-access
  namespace: myapp
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: minio
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - metamodel-orchestration
                  - metamodel-scheduler
                  - metamodel-worker
                  - metamodel-triggerer
                  - metamodel-dag-processor
      ports:
        - port: 9000
          protocol: TCP
