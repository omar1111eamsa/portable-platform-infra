# Allow pipeline services to reach RabbitMQ
# Only pipeline components need event bus access
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rabbitmq-access
  namespace: myapp
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: rabbitmq
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - metamodel-orchestration
                  - metamodel-worker
                  - execution-engine
                  - portfolio-builder
      ports:
        - port: 5672
          protocol: TCP
