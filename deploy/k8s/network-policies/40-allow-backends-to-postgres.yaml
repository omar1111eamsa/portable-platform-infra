# Allow only specific services to reach PostgreSQL
# Principle of least privilege — not every pod needs DB access
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backends-to-postgres
  namespace: myapp
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - user-management
                  - predictions-intake
                  - payment-service
                  - kpi-dashboard
                  - crm-client
                  - metamodel-orchestration
                  - metamodel-scheduler
                  - metamodel-worker
                  - execution-engine
                  - scoring-engine
                  - portfolio-builder
      ports:
        - port: 5432
          protocol: TCP
