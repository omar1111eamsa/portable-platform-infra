apiVersion: apps/v1
kind: Deployment
metadata:
  name: execution-engine
  namespace: myapp
  labels:
    app: execution-engine
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: execution-engine
  template:
    metadata:
      labels:
        app: execution-engine
    spec:
      restartPolicy: Always
      nodeSelector:
        kubernetes.io/hostname: backend2
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: execution-engine
          image: ghcr.io/myapp/cq-execution-engine:b20ee5c
          imagePullPolicy: Always
          command: ["python", "engine/reporting/consumer_realtime.py"]
          env:
            - name: DB_CONN
              valueFrom:
                secretKeyRef:
                  name: metamodel-db-credentials
                  key: MYAPP_DB_URL
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_PASSWORD
            - name: RABBITMQ_VHOST
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_VHOST
            - name: EXECUTION_EVENTS_EXCHANGE
              value: "execution.events"
            - name: EXECUTION_EVENTS_ROUTING_KEY
              value: "trade_signal.created"
            - name: EXECUTION_EVENTS_QUEUE
              value: "execution.trade_signals"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "400m"
