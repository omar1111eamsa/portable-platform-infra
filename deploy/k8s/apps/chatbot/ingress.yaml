# Ingress API Gateway — k3s utilise Traefik par défaut
# Adapter le host selon ton domaine (ex: api.myapp.com)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chatbot
  namespace: myapp
  labels:
    app: chatbot
spec:
  ingressClassName: traefik
  rules:
    - host: chatbot.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chatbot
                port:
                  number: 8000
