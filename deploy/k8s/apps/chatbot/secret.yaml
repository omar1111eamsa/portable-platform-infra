# Secret for chatbot LLM API key (OpenRouter)
# Create/update: kubectl create secret generic chatbot-credentials -n myapp --from-literal=LLM_API_KEY=sk-or-your-key --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: chatbot-credentials
  namespace: myapp
  labels:
    app: chatbot
type: Opaque
stringData:
  LLM_API_KEY: "sk-or-placeholder"  # Replace with real OpenRouter key for chatbot to work
