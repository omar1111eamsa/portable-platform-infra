apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot
  namespace: myapp
  labels:
    app: chatbot
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: chatbot
  template:
    metadata:
      labels:
        app: chatbot
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: frontend-vm
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: chatbot
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: chatbot
          image: ghcr.io/myapp/backend-chatbot:d46e577
          imagePullPolicy: Always
          env:
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: chatbot-credentials
                  key: LLM_API_KEY
            - name: DB_PATH
              value: /data/chatbot.db
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: chatbot-data
              mountPath: /data
      volumes:
        - name: chatbot-data
          persistentVolumeClaim:
            claimName: chatbot-data-pvc
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
