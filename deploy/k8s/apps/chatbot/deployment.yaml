apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot
  namespace: myapp
  labels:
    app: chatbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot
  template:
    metadata:
      labels:
        app: chatbot
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: chatbot
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: chatbot
          image: ghcr.io/myapp/backend-chatbot:9e1bc44
          imagePullPolicy: Always
          env:
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: chatbot-credentials
                  key: LLM_API_KEY
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
