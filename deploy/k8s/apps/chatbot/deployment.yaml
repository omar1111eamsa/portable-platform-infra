apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot
  namespace: myapp
  labels:
    app.kubernetes.io/name: chatbot
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chatbot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chatbot
        app.kubernetes.io/component: backend
    spec:
      nodeSelector:
        kubernetes.io/hostname: myapp-worker-01
      containers:
        - name: chatbot
          image: ghcr.io/myapp/backend-chatbot:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: chatbot-credentials
                  key: LLM_API_KEY
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
