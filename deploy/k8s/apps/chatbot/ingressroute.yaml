# IngressRoute (Traefik CRD) — /chatbot via API Gateway (JWT requis)
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: chatbot-route
  namespace: myapp
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`dev.example.com`) && PathPrefix(`/chatbot`)
      kind: Rule
      priority: 300
      services:
        - name: api-gateway
          port: 8888
