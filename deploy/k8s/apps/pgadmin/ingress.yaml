apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pgadmin-ingress
  namespace: myapp
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: dev.example.com
      http:
        paths:
          - path: /pgadmin
            pathType: Prefix
            backend:
              service:
                name: pgadmin
                port:
                  number: 8080
