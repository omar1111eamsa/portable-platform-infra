apiVersion: apps/v1
kind: Deployment
metadata:
  name: metamodel-scheduler
  namespace: myapp
  labels:
    app: metamodel-scheduler
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: metamodel-scheduler
  template:
    metadata:
      labels:
        app: metamodel-scheduler
    spec:
      enableServiceLinks: false
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: backend2
      tolerations:
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: metamodel-scheduler
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: airflow-db-init
          image: ghcr.io/myapp/metamodel-orschestation-airflow:ed8df0d
          command: ["python", "-m", "airflow", "db", "migrate"]
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: metamodel-db-credentials
                  key: AIRFLOW_CONN_POSTGRES_MYAPP
            - name: AIRFLOW__CORE__EXECUTOR
              value: "CeleryExecutor"
            - name: AIRFLOW__CELERY__BROKER_URL
              value: "redis://redis:6379/0"
            - name: AIRFLOW__CORE__EXECUTION_API_SERVER_URL
              value: "http://metamodel-orchestration:8080/execution/"
          securityContext:
            runAsNonRoot: true
            runAsUser: 50000
      containers:
        - name: metamodel-scheduler
          image: ghcr.io/myapp/metamodel-orschestation-airflow:ed8df0d
          imagePullPolicy: Always
          command: ["python", "-m", "airflow", "scheduler"]
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: metamodel-db-credentials
                  key: AIRFLOW_CONN_POSTGRES_MYAPP
            - name: AIRFLOW__CORE__EXECUTION_API_SERVER_URL
              value: "http://metamodel-orchestration:8080/execution/"
            - name: AIRFLOW__API_AUTH__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-credentials
                  key: JWT_SECRET
            - name: MYAPP_DB_URL
              valueFrom:
                secretKeyRef:
                  name: metamodel-db-credentials
                  key: MYAPP_DB_URL
            - name: AIRFLOW_CONN_POSTGRES_MYAPP
              valueFrom:
                secretKeyRef:
                  name: metamodel-db-credentials
                  key: AIRFLOW_CONN_POSTGRES_MYAPP
            - name: WORLDMONITOR_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-credentials
                  key: WORLDMONITOR_BASE_URL
                  optional: true
            - name: WORLDMONITOR_TOKEN
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-credentials
                  key: WORLDMONITOR_TOKEN
                  optional: true
            - name: WORLDMONITOR_ENDPOINT_SIGNALS
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-credentials
                  key: WORLDMONITOR_ENDPOINT_SIGNALS
                  optional: true
            - name: WORLDMONITOR_TIMEOUT_SECONDS
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-credentials
                  key: WORLDMONITOR_TIMEOUT_SECONDS
                  optional: true
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_PASSWORD
            - name: RABBITMQ_VHOST
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_VHOST
            - name: EXECUTION_EVENTS_EXCHANGE
              value: "execution.events"
            - name: EXECUTION_EVENTS_ROUTING_KEY
              value: "trade_signal.created"
            - name: PYTHONPATH
              value: "/opt/airflow/modules/cq-scoring:/opt/airflow/modules/cq-portfolio:/opt/airflow/modules/cq-portfolio/src"
          volumeMounts:
            - name: modules
              mountPath: /opt/airflow/modules
          resources:
            requests:
              memory: "384Mi"
              cpu: "150m"
            limits:
              memory: "768Mi"
              cpu: "500m"
      volumes:
        - name: modules
          persistentVolumeClaim:
            claimName: metamodel-modules-pvc
      securityContext:
        runAsNonRoot: true
        runAsUser: 50000
