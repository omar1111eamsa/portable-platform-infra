apiVersion: apps/v1
kind: Deployment
metadata:
  name: metamodel-scheduler
  namespace: myapp
  labels:
    app: metamodel-scheduler
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: metamodel-scheduler
  template:
    metadata:
      annotations:
        metamodel.example.com/modules-revision: "scoring=800e492b43fcea3dec43806a8ce405cb64528efe;portfolio=21382f2427c869370ca9bea3c5106a7d93607fd2"
      labels:
        app: metamodel-scheduler
    spec:
      enableServiceLinks: false
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: backend2
      tolerations:
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: metamodel-scheduler
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: metamodel-scheduler
          image: ghcr.io/myapp/metamodel-orschestation-airflow:e7d6fe5
          imagePullPolicy: Always
          command: ["python", "-m", "airflow", "scheduler"]
          env:
            - name: AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS
              value: "admin:admin"
            - name: AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE
              value: "/opt/airflow/secrets/simple_auth_manager_passwords.json"
            - name: AIRFLOW__LOGGING__REMOTE_LOGGING
              value: "true"
            - name: AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID
              value: "aws_default"
            - name: AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER
              value: "s3://airflow-logs/task-logs"
            - name: AIRFLOW__LOGGING__DELETE_LOCAL_LOGS
              value: "true"
            - name: AIRFLOW_CONN_AWS_DEFAULT
              valueFrom:
                secretKeyRef:
                  name: metamodel-airflow-s3-logging
                  key: AIRFLOW_CONN_AWS_DEFAULT
            - name: METAMODEL_SCORING_REF
              value: "bef136b99d60080f511ffa80b213b9ba3ae986db"
            - name: METAMODEL_PORTFOLIO_REF
              value: "917dbbe1521e10f1248b5da1eb3ed5f133b5f28d"
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: metamodel-db-credentials
                  key: AIRFLOW_CONN_POSTGRES_MYAPP
            - name: AIRFLOW__CORE__EXECUTOR
              value: "CeleryExecutor"
            - name: AIRFLOW__CELERY__BROKER_URL
              value: "redis://redis:6379/0"
            - name: AIRFLOW__CORE__EXECUTION_API_SERVER_URL
              value: "http://metamodel-orchestration:8080/execution/"
            - name: AIRFLOW__WORKERS__EXECUTION_API_TIMEOUT
              value: "60"
            - name: AIRFLOW__WORKERS__EXECUTION_API_RETRIES
              value: "10"
            - name: AIRFLOW__API_AUTH__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-credentials
                  key: JWT_SECRET
            - name: MYAPP_DB_URL
              valueFrom:
                secretKeyRef:
                  name: metamodel-db-credentials
                  key: MYAPP_DB_URL
            - name: AIRFLOW_CONN_POSTGRES_MYAPP
              valueFrom:
                secretKeyRef:
                  name: metamodel-db-credentials
                  key: AIRFLOW_CONN_POSTGRES_MYAPP
            - name: WORLDMONITOR_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-credentials
                  key: WORLDMONITOR_BASE_URL
                  optional: true
            - name: WORLDMONITOR_TOKEN
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-credentials
                  key: WORLDMONITOR_TOKEN
                  optional: true
            - name: WORLDMONITOR_ENDPOINT_SIGNALS
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-credentials
                  key: WORLDMONITOR_ENDPOINT_SIGNALS
                  optional: true
            - name: WORLDMONITOR_TIMEOUT_SECONDS
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-credentials
                  key: WORLDMONITOR_TIMEOUT_SECONDS
                  optional: true
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_PASSWORD
            - name: RABBITMQ_VHOST
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_VHOST
            - name: EXECUTION_EVENTS_EXCHANGE
              value: "execution.events"
            - name: EXECUTION_EVENTS_ROUTING_KEY
              value: "trade_signal.created"
            - name: PYTHONPATH
              value: "/opt/airflow/modules/cq-scoring:/opt/airflow/modules/cq-portfolio:/opt/airflow/modules/cq-portfolio/src"
          volumeMounts:
            - name: airflow-simple-auth
              mountPath: /opt/airflow/secrets
              readOnly: true
            - name: modules
              mountPath: /opt/airflow/modules
          resources:
            requests:
              memory: "384Mi"
              cpu: "150m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          startupProbe:
            exec:
              command: ["sh", "-c", "tr '\\000' ' ' </proc/1/cmdline | grep -q 'airflow scheduler'"]
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 30
          livenessProbe:
            exec:
              command: ["sh", "-c", "tr '\\000' ' ' </proc/1/cmdline | grep -q 'airflow scheduler'"]
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command: ["sh", "-c", "tr '\\000' ' ' </proc/1/cmdline | grep -q 'airflow scheduler'"]
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 10
      volumes:
        - name: airflow-simple-auth
          secret:
            secretName: metamodel-airflow-simple-auth
        - name: modules
          persistentVolumeClaim:
            claimName: metamodel-modules-pvc
      securityContext:
        runAsNonRoot: true
        runAsUser: 50000
