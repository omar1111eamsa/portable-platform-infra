apiVersion: apps/v1
kind: Deployment
metadata:
  name: metamodel-scheduler
  namespace: myapp
  labels:
    app.kubernetes.io/name: metamodel-scheduler
    app.kubernetes.io/component: pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: metamodel-scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metamodel-scheduler
        app.kubernetes.io/component: pipeline
    spec:
      nodeSelector:
        kubernetes.io/hostname: myapp-worker-02
      containers:
        - name: scheduler
          image: ghcr.io/myapp/metamodel-orchestration:latest
          command: ["airflow", "scheduler"]
          env:
            - name: AIRFLOW__CORE__EXECUTOR
              value: "CeleryExecutor"
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: metamodel-db-credentials
                  key: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
            - name: AIRFLOW__CELERY__BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: metamodel-db-credentials
                  key: AIRFLOW__CELERY__BROKER_URL
            - name: AIRFLOW__CORE__FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: metamodel-db-credentials
                  key: AIRFLOW__CORE__FERNET_KEY
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            exec:
              command:
                - airflow
                - jobs
                - check
                - --job-type
                - SchedulerJob
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          volumeMounts:
            - name: airflow-modules
              mountPath: /opt/airflow/modules
      volumes:
        - name: airflow-modules
          persistentVolumeClaim:
            claimName: metamodel-modules-pvc
