apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: metamodel-orchestration-ingress
  namespace: myapp
  labels:
    app: metamodel-orchestration
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: myapp-airflow-dedupe-api-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - airflow.example.com
      secretName: myapp-io-tls
  rules:
    - host: "airflow.example.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: metamodel-orchestration
                port:
                  number: 8080
