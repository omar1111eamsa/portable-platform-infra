apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: metamodel-orchestration-ingress
  namespace: myapp
  labels:
    app: metamodel-orchestration
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "240"
    traefik.ingress.kubernetes.io/router.middlewares: myapp-airflow-forward-prefix@kubernetescrd,myapp-airflow-strip-prefix@kubernetescrd,myapp-airflow-dedupe-api-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: "dev.example.com"
      http:
        paths:
          - path: /airflow
            pathType: Prefix
            backend:
              service:
                name: metamodel-orchestration
                port:
                  number: 8080
