apiVersion: apps/v1
kind: Deployment
metadata:
  name: metamodel-triggerer
  namespace: myapp
  labels:
    app: metamodel-triggerer
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: metamodel-triggerer
  template:
    metadata:
      annotations:
        metamodel.example.com/modules-revision: "scoring=800e492b43fcea3dec43806a8ce405cb64528efe;portfolio=21382f2427c869370ca9bea3c5106a7d93607fd2"
      labels:
        app: metamodel-triggerer
    spec:
      enableServiceLinks: false
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: backend2
      tolerations:
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: metamodel-triggerer
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: metamodel-triggerer
          image: ghcr.io/myapp/metamodel-orschestation-airflow:abbb4ae
          imagePullPolicy: Always
          command: ["python", "-m", "airflow", "triggerer"]
          env:
            - name: METAMODEL_SCORING_REF
              value: "957d2486fc14bd4c7cd82d0a886f3d5d028b326b"
            - name: METAMODEL_PORTFOLIO_REF
              value: "917dbbe1521e10f1248b5da1eb3ed5f133b5f28d"
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: metamodel-db-credentials
                  key: AIRFLOW_CONN_POSTGRES_MYAPP
            - name: AIRFLOW__CORE__EXECUTOR
              value: "CeleryExecutor"
            - name: AIRFLOW__CELERY__BROKER_URL
              value: "redis://redis:6379/0"
            - name: AIRFLOW__CORE__EXECUTION_API_SERVER_URL
              value: "http://metamodel-orchestration:8080/execution/"
            - name: AIRFLOW__API_AUTH__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-credentials
                  key: JWT_SECRET
            - name: MYAPP_DB_URL
              valueFrom:
                secretKeyRef:
                  name: metamodel-db-credentials
                  key: MYAPP_DB_URL
            - name: AIRFLOW_CONN_POSTGRES_MYAPP
              valueFrom:
                secretKeyRef:
                  name: metamodel-db-credentials
                  key: AIRFLOW_CONN_POSTGRES_MYAPP
            - name: PYTHONPATH
              value: "/opt/airflow/modules/cq-scoring:/opt/airflow/modules/cq-portfolio:/opt/airflow/modules/cq-portfolio/src"
          volumeMounts:
            - name: modules
              mountPath: /opt/airflow/modules
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          startupProbe:
            exec:
              command: ["sh", "-c", "tr '\\000' ' ' </proc/1/cmdline | grep -q triggerer"]
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 30
          livenessProbe:
            exec:
              command: ["sh", "-c", "tr '\\000' ' ' </proc/1/cmdline | grep -q triggerer"]
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command: ["sh", "-c", "tr '\\000' ' ' </proc/1/cmdline | grep -q triggerer"]
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 10
      volumes:
        - name: modules
          persistentVolumeClaim:
            claimName: metamodel-modules-pvc
      securityContext:
        runAsNonRoot: true
        runAsUser: 50000
