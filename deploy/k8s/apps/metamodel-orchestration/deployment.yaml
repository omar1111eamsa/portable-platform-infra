# Metamodel-orchestration = Apache Airflow API server (no gateway route; internal/cron use).
# Default replicas 0 on frontend-vm (see README). Now scheduled on backend2 node for tests.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metamodel-orchestration
  namespace: myapp
  labels:
    app: metamodel-orchestration
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: metamodel-orchestration
  template:
    metadata:
      labels:
        app: metamodel-orchestration
    spec:
      nodeSelector:
        kubernetes.io/hostname: backend2
      tolerations:
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: metamodel-orchestration
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: metamodel-orchestration
          # Image: Metamodel-orschestation-airflow (Airflow API server on port 8080)
          image: ghcr.io/myapp/metamodel-orschestation-airflow:396ab55
          imagePullPolicy: Always
          command: ["airflow", "api-server"]
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "384Mi"
              cpu: "150m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000

