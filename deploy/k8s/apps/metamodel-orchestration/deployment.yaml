apiVersion: apps/v1
kind: Deployment
metadata:
  name: metamodel-orchestration
  namespace: myapp
  labels:
    app.kubernetes.io/name: metamodel-orchestration
    app.kubernetes.io/component: pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: metamodel-orchestration
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metamodel-orchestration
        app.kubernetes.io/component: pipeline
    spec:
      nodeSelector:
        kubernetes.io/hostname: myapp-worker-02
      initContainers:
        - name: wait-for-postgres
          image: postgres:15
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -p 5432 -U $POSTGRES_USER; do
                echo "Waiting for PostgreSQL..."
                sleep 3
              done
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
        - name: wait-for-redis
          image: redis:7
          command:
            - sh
            - -c
            - |
              until redis-cli -h redis -a $REDIS_PASSWORD ping | grep PONG; do
                echo "Waiting for Redis..."
                sleep 3
              done
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
      containers:
        - name: airflow-webserver
          image: ghcr.io/myapp/metamodel-orchestration:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: AIRFLOW__CORE__EXECUTOR
              value: "CeleryExecutor"
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: metamodel-db-credentials
                  key: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
            - name: AIRFLOW__CELERY__BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: metamodel-db-credentials
                  key: AIRFLOW__CELERY__BROKER_URL
            - name: AIRFLOW__CELERY__RESULT_BACKEND
              valueFrom:
                secretKeyRef:
                  name: metamodel-db-credentials
                  key: AIRFLOW__CELERY__RESULT_BACKEND
            - name: AIRFLOW__CORE__FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: metamodel-db-credentials
                  key: AIRFLOW__CORE__FERNET_KEY
            - name: AIRFLOW__WEBSERVER__SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: metamodel-airflow-simple-auth
                  key: AIRFLOW__WEBSERVER__SECRET_KEY
            - name: AIRFLOW__LOGGING__REMOTE_LOGGING
              value: "True"
            - name: AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER
              value: "s3://airflow-logs"
            - name: AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID
              value: "aws_default"
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /api/v2/monitor/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v2/monitor/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /api/v2/monitor/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          volumeMounts:
            - name: airflow-modules
              mountPath: /opt/airflow/modules
      volumes:
        - name: airflow-modules
          persistentVolumeClaim:
            claimName: metamodel-modules-pvc
