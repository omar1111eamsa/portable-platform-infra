apiVersion: apps/v1
kind: Deployment
metadata:
  name: metamodel-orchestration
  namespace: myapp
  labels:
    app: metamodel-orchestration
spec:
  replicas: 0
  selector:
    matchLabels:
      app: metamodel-orchestration
  template:
    metadata:
      labels:
        app: metamodel-orchestration
    spec:
      nodeSelector:
        kubernetes.io/hostname: frontend-vm
      tolerations:
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: metamodel-orchestration
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: metamodel-orchestration
          # Image pushed by Metamodel-orschestation-airflow CI (repo name has typo); use same name until CI is renamed
          image: ghcr.io/myapp/metamodel-orschestation-airflow:396ab55
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000

