# Metamodel-orchestration = Apache Airflow API server (internal use).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metamodel-orchestration
  namespace: myapp
  labels:
    app: metamodel-orchestration
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: metamodel-orchestration
  template:
    metadata:
      annotations:
        metamodel.example.com/modules-revision: "scoring=800e492b43fcea3dec43806a8ce405cb64528efe;portfolio=21382f2427c869370ca9bea3c5106a7d93607fd2"
      labels:
        app: metamodel-orchestration
    spec:
      enableServiceLinks: false
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: backend2
      tolerations:
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: metamodel-orchestration
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: airflow-db-init
          image: ghcr.io/myapp/metamodel-orschestation-airflow:48096a6
          command: ["python", "-m", "airflow", "db", "migrate"]
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: metamodel-db-credentials
                  key: AIRFLOW_CONN_POSTGRES_MYAPP
            - name: AIRFLOW__CORE__EXECUTOR
              value: "CeleryExecutor"
            - name: AIRFLOW__CELERY__BROKER_URL
              value: "redis://redis:6379/0"
            - name: AIRFLOW__CORE__EXECUTION_API_SERVER_URL
              value: "http://metamodel-orchestration:8080/execution/"
          securityContext:
            runAsNonRoot: true
            runAsUser: 50000
        - name: modules-sync
          image: alpine/git@sha256:d453f54c83320412aa89c391b076930bd8569bc1012285e8c68ce2d4435826a3
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: token
            - name: METAMODEL_SCORING_REF
              value: "957d2486fc14bd4c7cd82d0a886f3d5d028b326b"
            - name: METAMODEL_PORTFOLIO_REF
              value: "917dbbe1521e10f1248b5da1eb3ed5f133b5f28d"
          command:
            - sh
            - -c
            - |
              set -e
              GH_AUTH_URL="https://x-access-token:${GITHUB_TOKEN}@github.com"
              rm -rf /modules/cq-scoring /modules/cq-portfolio
              git clone --depth 1 --branch test-ci "${GH_AUTH_URL}/MyApp/metamodel-scoring-engine-new.git" /modules/cq-scoring
              git -C /modules/cq-scoring fetch --depth 1 origin "${METAMODEL_SCORING_REF}"
              git -C /modules/cq-scoring checkout --detach "${METAMODEL_SCORING_REF}"
              git clone --depth 1 "${GH_AUTH_URL}/MyApp/Metamodel-portfolio-builder.git" /modules/cq-portfolio
              git -C /modules/cq-portfolio fetch --depth 1 origin "${METAMODEL_PORTFOLIO_REF}"
              git -C /modules/cq-portfolio checkout --detach "${METAMODEL_PORTFOLIO_REF}"
          volumeMounts:
            - name: modules
              mountPath: /modules
        - name: airflow-simple-auth-init
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -eu
              cp /bootstrap/simple_auth_manager_passwords.json /secrets/simple_auth_manager_passwords.json
              chmod 600 /secrets/simple_auth_manager_passwords.json
          volumeMounts:
            - name: airflow-simple-auth-bootstrap
              mountPath: /bootstrap
              readOnly: true
            - name: airflow-simple-auth
              mountPath: /secrets
      containers:
        - name: metamodel-orchestration
          # Image: Metamodel-orschestation-airflow (Airflow API server on port 8080) — same as init (latest SHA)
          image: ghcr.io/myapp/metamodel-orschestation-airflow:48096a6
          imagePullPolicy: Always
          command: ["python", "-m", "airflow", "api-server"]
          env:
            - name: AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS
              value: "admin:admin"
            - name: AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE
              value: "/opt/airflow/secrets/simple_auth_manager_passwords.json"
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: metamodel-db-credentials
                  key: AIRFLOW_CONN_POSTGRES_MYAPP
            - name: AIRFLOW__CORE__EXECUTION_API_SERVER_URL
              value: "http://metamodel-orchestration:8080/execution/"
            - name: AIRFLOW__API_AUTH__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-credentials
                  key: JWT_SECRET
            - name: MYAPP_DB_URL
              valueFrom:
                secretKeyRef:
                  name: metamodel-db-credentials
                  key: MYAPP_DB_URL
            - name: AIRFLOW_CONN_POSTGRES_MYAPP
              valueFrom:
                secretKeyRef:
                  name: metamodel-db-credentials
                  key: AIRFLOW_CONN_POSTGRES_MYAPP
            - name: WORLDMONITOR_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-credentials
                  key: WORLDMONITOR_BASE_URL
                  optional: true
            - name: WORLDMONITOR_TOKEN
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-credentials
                  key: WORLDMONITOR_TOKEN
                  optional: true
            - name: WORLDMONITOR_ENDPOINT_SIGNALS
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-credentials
                  key: WORLDMONITOR_ENDPOINT_SIGNALS
                  optional: true
            - name: WORLDMONITOR_TIMEOUT_SECONDS
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-credentials
                  key: WORLDMONITOR_TIMEOUT_SECONDS
                  optional: true
            - name: PYTHONPATH
              value: "/opt/airflow/modules/cq-scoring:/opt/airflow/modules/cq-portfolio:/opt/airflow/modules/cq-portfolio/src"
          volumeMounts:
            - name: entrypoint
              mountPath: /entrypoint.sh
              subPath: entrypoint.sh
            - name: airflow-simple-auth
              mountPath: /opt/airflow/secrets
            - name: modules
              mountPath: /opt/airflow/modules
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"
          startupProbe:
            httpGet:
              path: /api/v2/monitor/health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /api/v2/monitor/health
              port: 8080
            initialDelaySeconds: 240
            periodSeconds: 20
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v2/monitor/health
              port: 8080
            initialDelaySeconds: 150
            periodSeconds: 10
            timeoutSeconds: 10
      volumes:
        - name: entrypoint
          configMap:
            name: metamodel-entrypoint
            defaultMode: 0o755
        - name: modules
          persistentVolumeClaim:
            claimName: metamodel-modules-pvc
        - name: airflow-simple-auth
          emptyDir: {}
        - name: airflow-simple-auth-bootstrap
          secret:
            secretName: metamodel-airflow-simple-auth
      securityContext:
        runAsNonRoot: true
        runAsUser: 50000  # airflow user in apache/airflow image
