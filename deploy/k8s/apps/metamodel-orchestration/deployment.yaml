apiVersion: apps/v1
kind: Deployment
metadata:
  name: metamodel-orchestration
  namespace: myapp
  labels:
    app: metamodel-orchestration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metamodel-orchestration
  template:
    metadata:
      labels:
        app: metamodel-orchestration
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: metamodel-orchestration
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: metamodel-orchestration
          image: ghcr.io/myapp/metamodel-orschestation-airflow:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000

