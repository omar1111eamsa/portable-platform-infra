# Metamodel-orchestration = Apache Airflow API server (internal use).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metamodel-orchestration
  namespace: myapp
  labels:
    app: metamodel-orchestration
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: metamodel-orchestration
  template:
    metadata:
      labels:
        app: metamodel-orchestration
    spec:
      enableServiceLinks: false
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: backend2
      tolerations:
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: metamodel-orchestration
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: airflow-db-init
          image: ghcr.io/myapp/metamodel-orschestation-airflow:34805f7
          command: ["python", "-m", "airflow", "db", "migrate"]
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: metamodel-db-credentials
                  key: AIRFLOW_CONN_POSTGRES_MYAPP
            - name: AIRFLOW__CORE__EXECUTOR
              value: "CeleryExecutor"
            - name: AIRFLOW__CELERY__BROKER_URL
              value: "redis://redis:6379/0"
            - name: AIRFLOW__CORE__EXECUTION_API_SERVER_URL
              value: "http://metamodel-orchestration:8080/execution/"
          securityContext:
            runAsNonRoot: true
            runAsUser: 50000
        - name: modules-sync
          image: alpine/git:latest
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: token
          command:
            - sh
            - -c
            - |
              set -e
              AUTH="$(printf 'x-access-token:%s' "${GITHUB_TOKEN}" | base64 | tr -d '\n')"
              rm -rf /modules/cq-scoring /modules/cq-portfolio
              git -c http.extraHeader="Authorization: Basic ${AUTH}" clone --depth 1 --branch test-ci https://github.com/MyApp/metamodel-scoring-engine-new.git /modules/cq-scoring
              git -c http.extraHeader="Authorization: Basic ${AUTH}" clone --depth 1 https://github.com/MyApp/Metamodel-portfolio-builder.git /modules/cq-portfolio
          volumeMounts:
            - name: modules
              mountPath: /modules
      containers:
        - name: metamodel-orchestration
          # Image: Metamodel-orschestation-airflow (Airflow API server on port 8080) — same as init (latest SHA)
          image: ghcr.io/myapp/metamodel-orschestation-airflow:34805f7
          imagePullPolicy: Always
          command: ["python", "-m", "airflow", "api-server"]
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: metamodel-db-credentials
                  key: AIRFLOW_CONN_POSTGRES_MYAPP
            - name: AIRFLOW__CORE__EXECUTION_API_SERVER_URL
              value: "http://metamodel-orchestration:8080/execution/"
            - name: AIRFLOW__API_AUTH__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-credentials
                  key: JWT_SECRET
            - name: MYAPP_DB_URL
              valueFrom:
                secretKeyRef:
                  name: metamodel-db-credentials
                  key: MYAPP_DB_URL
            - name: AIRFLOW_CONN_POSTGRES_MYAPP
              valueFrom:
                secretKeyRef:
                  name: metamodel-db-credentials
                  key: AIRFLOW_CONN_POSTGRES_MYAPP
            - name: WORLDMONITOR_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-credentials
                  key: WORLDMONITOR_BASE_URL
                  optional: true
            - name: WORLDMONITOR_TOKEN
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-credentials
                  key: WORLDMONITOR_TOKEN
                  optional: true
            - name: WORLDMONITOR_ENDPOINT_SIGNALS
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-credentials
                  key: WORLDMONITOR_ENDPOINT_SIGNALS
                  optional: true
            - name: WORLDMONITOR_TIMEOUT_SECONDS
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-credentials
                  key: WORLDMONITOR_TIMEOUT_SECONDS
                  optional: true
            - name: PYTHONPATH
              value: "/opt/airflow/modules/cq-scoring:/opt/airflow/modules/cq-portfolio:/opt/airflow/modules/cq-portfolio/src"
          volumeMounts:
            - name: entrypoint
              mountPath: /entrypoint.sh
              subPath: entrypoint.sh
            - name: modules
              mountPath: /opt/airflow/modules
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "384Mi"
              cpu: "150m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /api/v2/monitor/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /api/v2/monitor/health
              port: 8080
            initialDelaySeconds: 180
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v2/monitor/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: entrypoint
          configMap:
            name: metamodel-entrypoint
            defaultMode: 0o755
        - name: modules
          persistentVolumeClaim:
            claimName: metamodel-modules-pvc
      securityContext:
        runAsNonRoot: true
        runAsUser: 50000  # airflow user in apache/airflow image
