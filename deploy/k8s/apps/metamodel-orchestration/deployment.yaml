# Metamodel-orchestration = Apache Airflow API server (no gateway route; internal/cron use).
# Default replicas 0 on frontend-vm (see README). Now scheduled on backend2 node for tests.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metamodel-orchestration
  namespace: myapp
  labels:
    app: metamodel-orchestration
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: metamodel-orchestration
  template:
    metadata:
      labels:
        app: metamodel-orchestration
    spec:
      nodeSelector:
        kubernetes.io/hostname: backend2
      tolerations:
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: metamodel-orchestration
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: airflow-db-init
          image: ghcr.io/myapp/metamodel-orschestation-airflow:cbeed25
          command: ["python", "-m", "airflow", "db", "migrate"]
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: "sqlite:////opt/airflow/db/airflow.db"
          volumeMounts:
            - name: airflow-db
              mountPath: /opt/airflow/db
          securityContext:
            runAsNonRoot: true
            runAsUser: 50000
        - name: modules-sync
          image: alpine/git:latest
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: token
          command:
            - sh
            - -c
            - |
              set -e
              rm -rf /modules/cq-scoring /modules/cq-portfolio
              git clone --depth 1 "https://${GITHUB_TOKEN}@github.com/MyApp/Metamodel-scoring-engine.git" /modules/cq-scoring
              git clone --depth 1 "https://${GITHUB_TOKEN}@github.com/MyApp/Metamodel-portfolio-builder.git" /modules/cq-portfolio
              chown -R 50000:50000 /modules
          volumeMounts:
            - name: modules
              mountPath: /modules
      containers:
        - name: metamodel-orchestration
          # Image: Metamodel-orschestation-airflow (Airflow API server on port 8080) — same as init (latest SHA)
          image: ghcr.io/myapp/metamodel-orschestation-airflow:cbeed25
          imagePullPolicy: Always
          command: ["python", "-m", "airflow", "api-server"]
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: "sqlite:////opt/airflow/db/airflow.db"
            - name: PYTHONPATH
              value: "/opt/airflow/modules/cq-scoring:/opt/airflow/modules/cq-portfolio:/opt/airflow/modules/cq-portfolio/src"
          volumeMounts:
            - name: entrypoint
              mountPath: /entrypoint.sh
              subPath: entrypoint.sh
            - name: airflow-db
              mountPath: /opt/airflow/db
            - name: modules
              mountPath: /opt/airflow/modules
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "384Mi"
              cpu: "150m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /api/v2/monitor/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/v2/monitor/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v2/monitor/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: entrypoint
          configMap:
            name: metamodel-entrypoint
            defaultMode: 0o755
        - name: airflow-db
          emptyDir: {}
        - name: modules
          persistentVolumeClaim:
            claimName: metamodel-modules-pvc
      securityContext:
        runAsNonRoot: true
        runAsUser: 50000  # airflow user in apache/airflow image

