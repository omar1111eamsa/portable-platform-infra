apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-management
  namespace: myapp
  labels:
    app: user-management
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: user-management
  template:
    metadata:
      labels:
        app: user-management
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: frontend-vm
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: user-management
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: user-management
          image: ghcr.io/myapp/backend-user-management-and-subscripption:7d4df31
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_APPLICATION_NAME
              value: user-management
            - name: SERVER_PORT
              value: "8081"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SPRING_CLOUD_CONSUL_HOST
              value: consul
            - name: SPRING_CLOUD_CONSUL_PORT
              value: "8500"
            - name: SPRING_CLOUD_CONSUL_DISCOVERY_ENABLED
              value: "true"
            - name: SPRING_CLOUD_CONSUL_DISCOVERY_REGISTER
              value: "true"
            - name: SPRING_CLOUD_CONSUL_DISCOVERY_DEREGISTER
              value: "true"
            - name: SPRING_CLOUD_CONSUL_DISCOVERY_SERVICE_NAME
              value: user-service
            - name: SPRING_CLOUD_CONSUL_DISCOVERY_PREFER_IP_ADDRESS
              value: "true"
            - name: SPRING_CLOUD_CONSUL_DISCOVERY_IP_ADDRESS
              value: "$(POD_IP)"
            - name: SPRING_CLOUD_CONSUL_DISCOVERY_INSTANCE_ID
              value: "$(POD_NAME)"
            - name: SPRING_CLOUD_CONSUL_DISCOVERY_HEALTH_CHECK_PATH
              value: /actuator/health
            - name: SPRING_CLOUD_CONSUL_DISCOVERY_HEALTH_CHECK_CRITICAL_TIMEOUT
              value: 1m
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/userdb
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: JPA_DDL_AUTO
              value: update
            - name: SPRING_RABBITMQ_HOST
              value: rabbitmq
            - name: SPRING_RABBITMQ_PORT
              value: "5672"
            - name: SPRING_RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_USERNAME
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_PASSWORD
            - name: SPRING_RABBITMQ_ADDRESSES
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_ADDRESSES
            - name: APP_RABBITMQ_SUBSCRIPTION_UPDATES_QUEUE
              value: "subscription_updates_queue"
            - name: APP_RABBITMQ_EVENTS_EXCHANGE
              value: "payment.events"
            - name: APP_RABBITMQ_SUBSCRIPTION_UPDATES_ROUTING_KEY
              value: "subscription.updates"
            - name: APP_RABBITMQ_DIRECT_SUBMISSIONS_QUEUE
              value: "direct_submissions_queue"
            - name: APP_RABBITMQ_DIRECT_SUBMISSIONS_EXCHANGE
              value: "direct_submissions_exchange"
            - name: APP_RABBITMQ_DIRECT_SUBMISSIONS_ROUTING_KEY
              value: "direct_submissions_rk"
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: google-oauth-credentials
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: google-oauth-credentials
                  key: GOOGLE_CLIENT_SECRET
            - name: GOOGLE_REDIRECT_URI
              valueFrom:
                secretKeyRef:
                  name: google-oauth-credentials
                  key: GOOGLE_REDIRECT_URI
            - name: FRONTEND_URL
              valueFrom:
                secretKeyRef:
                  name: google-oauth-credentials
                  key: FRONTEND_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-credentials
                  key: JWT_SECRET
            - name: SPRING_MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mail-credentials
                  key: SPRING_MAIL_USERNAME
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mail-credentials
                  key: SPRING_MAIL_PASSWORD
            - name: SKIP_EMAIL_SEND
              value: "false"
            - name: SPRING_MAIN_LAZY_INITIALIZATION
              value: "false"
          resources:
            requests:
              memory: "384Mi"
              cpu: "200m"
            limits:
              memory: "768Mi"
              cpu: "1000m"
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 180
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 0
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
