apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-management
  namespace: myapp
  labels:
    app: user-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-management
  template:
    metadata:
      labels:
        app: user-management
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: user-management
          image: ghcr.io/myapp/backend-user-management-and-subscripption:test-ci-user-management
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_APPLICATION_NAME
              value: user-management
            - name: SERVER_PORT
              value: "8081"
            - name: SPRING_CLOUD_CONSUL_HOST
              value: consul
            - name: SPRING_CLOUD_CONSUL_PORT
              value: "8500"
            - name: SPRING_CLOUD_CONSUL_DISCOVERY_ENABLED
              value: "true"
            - name: SPRING_CLOUD_CONSUL_DISCOVERY_REGISTER
              value: "true"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/userdb
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 5
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
