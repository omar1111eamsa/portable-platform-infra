# Alias for predictions-intake (JwtValidationClient expects host "user-service")
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: myapp
  labels:
    app: user-management
spec:
  selector:
    app: user-management
  ports:
    - port: 8081
      targetPort: 8081
      name: http
  type: ClusterIP
