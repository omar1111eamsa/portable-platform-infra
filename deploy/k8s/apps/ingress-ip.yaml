# Ingress for dev.example.com
#
# Priority model:
#   300 - ingress-ip-api          API paths (/api /login /oauth2 ...) -> api-gateway
#   150 - ingressroute-mobile-detect  User-Agent mobile -> mobile-web  (IngressRoute CRD)
#   100 - ingressroute-desktop        desktop fallback -> frontend      (IngressRoute CRD)
#
# Mobile/desktop routing is handled by IngressRoute CRDs in ingressroute-frontend.yaml.
# The standard Ingress below only handles the API surface and the admin dashboard.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-ip-api
  namespace: myapp
  labels:
    app: ingress-ip
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "300"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - "dev.example.com"
      secretName: dev-myapp-io-tls
  rules:
    - host: "dev.example.com"
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
          - path: /login
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
          - path: /chatbot
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
          - path: /payment-service
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-dashboard-admin
  namespace: myapp
  labels:
    app: ingress-ip
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "110"
spec:
  ingressClassName: traefik
  rules:
    - host: "dashboard.example.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-frontend
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-mobile-host
  namespace: myapp
  labels:
    app: ingress-ip
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "100"
spec:
  ingressClassName: traefik
  rules:
    - host: "mobile.example.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mobile-web
                port:
                  number: 80
