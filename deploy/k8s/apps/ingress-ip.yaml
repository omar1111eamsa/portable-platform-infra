# Ingress for dev.example.com (frontend + API gateway)
# ingress-ip-api priority > ingress-ip-frontend so /api, /login, etc. match before /
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-ip-api
  namespace: myapp
  labels:
    app: ingress-ip
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "200"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - "dev.example.com"
      secretName: dev-myapp-io-tls
  rules:
    - host: "dev.example.com"
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
          - path: /login
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
          - path: /chatbot
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
          - path: /payment-service
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-ip-frontend
  namespace: myapp
  labels:
    app: ingress-ip
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "100"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - "dev.example.com"
      secretName: dev-myapp-io-tls
  rules:
    - host: "dev.example.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-dashboard-admin
  namespace: myapp
  labels:
    app: ingress-ip
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "110"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - "dashboard.example.com"
      secretName: dashboard-myapp-io-tls
  rules:
    - host: "dashboard.example.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-frontend
                port:
                  number: 8080
