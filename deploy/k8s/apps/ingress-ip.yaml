# Ingress pour accès direct par IP (http://203.0.113.10) et ngrok
# Complète les Ingress par host (api.localhost, app.localhost)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-ip
  namespace: myapp
  labels:
    app: ingress-ip
  annotations:
    # Traefik: priorité haute pour que /api et /login matchent avant /
    traefik.ingress.kubernetes.io/router.priority: "100"
spec:
  ingressClassName: traefik
  rules:
    # Host ngrok (Google OAuth nécessite un domaine, pas une IP)
    - host: "example.ngrok-free.app"
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
          - path: /login
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
    # Sans host = accès par IP (203.0.113.10)
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
          - path: /login
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
