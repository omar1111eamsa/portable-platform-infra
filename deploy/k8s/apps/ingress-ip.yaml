# Ingress pour accès direct par IP (http://203.0.113.11) et ngrok
# Complète les Ingress par host (api.localhost, app.localhost)
# IMPORTANT: ingress-ip-api doit avoir priorité > ingress-ip-frontend pour que /api, /login, /oauth2, /chatbot, /payment-service, /internal
# matchent avant le catch-all /
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-ip-api
  namespace: myapp
  labels:
    app: ingress-ip
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "200"
spec:
  ingressClassName: traefik
  rules:
    - host: "example.ngrok-free.dev"
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
          - path: /login
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
          - path: /chatbot
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
          - path: /payment-service
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
          - path: /internal
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
          - path: /login
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
          - path: /chatbot
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
          - path: /payment-service
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
          - path: /internal
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-ip-frontend
  namespace: myapp
  labels:
    app: ingress-ip
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "100"
spec:
  ingressClassName: traefik
  rules:
    - host: "example.ngrok-free.dev"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
