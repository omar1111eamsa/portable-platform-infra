# Ingress Frontend — k3s utilise Traefik par défaut
# Adapter le host selon ton domaine (ex: app.myapp.com)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  namespace: myapp
  labels:
    app: frontend
spec:
  ingressClassName: traefik
  rules:
    - host: app.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
