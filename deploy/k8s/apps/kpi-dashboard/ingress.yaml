apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kpi-dashboard
  namespace: myapp
  labels:
    app: kpi-dashboard
spec:
  ingressClassName: traefik
  rules:
    - host: kpi.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kpi-dashboard
                port:
                  number: 8084
