# All routing for dev.example.com — single IngressRoute CRD with explicit priorities.
# Traefik v3: no OR (||) in rules — use separate route entries per path prefix.
#
# Priority order (highest wins):
#   200 — API/backend paths (any UA) → api-gateway
#   150 — mobile User-Agent         → mobile-web
#   100 — desktop fallback           → frontend

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ingressroute-myapp
  namespace: myapp
  labels:
    app: ingress-ip
spec:
  entryPoints:
    - websecure
    - web
  tls:
    secretName: dev-myapp-io-tls
  routes:
    # ── API paths (priority 200) ─────────────────────────────────────────────
    - match: Host(`dev.example.com`) && PathPrefix(`/api`)
      kind: Rule
      priority: 200
      services:
        - name: api-gateway
          port: 8888

    - match: Host(`dev.example.com`) && PathPrefix(`/login`)
      kind: Rule
      priority: 200
      services:
        - name: api-gateway
          port: 8888

    - match: Host(`dev.example.com`) && PathPrefix(`/oauth2`)
      kind: Rule
      priority: 200
      services:
        - name: api-gateway
          port: 8888

    - match: Host(`dev.example.com`) && PathPrefix(`/chatbot`)
      kind: Rule
      priority: 200
      services:
        - name: api-gateway
          port: 8888

    - match: Host(`dev.example.com`) && PathPrefix(`/ws`)
      kind: Rule
      priority: 200
      services:
        - name: api-gateway
          port: 8888

    - match: Host(`dev.example.com`) && PathPrefix(`/payment-service`)
      kind: Rule
      priority: 200
      services:
        - name: api-gateway
          port: 8888

    # ── Mobile browser (priority 150) ────────────────────────────────────────
    - match: >-
        Host(`dev.example.com`) &&
        HeaderRegexp(`User-Agent`,
          `(?i)(Mobile|Android|iPhone|iPad|iPod|webOS|BlackBerry|Windows Phone|IEMobile|Opera Mini)`)
      kind: Rule
      priority: 150
      services:
        - name: mobile-web
          port: 80

    # ── Desktop fallback (priority 100) ──────────────────────────────────────
    - match: Host(`dev.example.com`)
      kind: Rule
      priority: 100
      services:
        - name: frontend
          port: 3000
