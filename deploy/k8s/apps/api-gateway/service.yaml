apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: myapp
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: gateway
spec:
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
    - name: http
      port: 8888
      targetPort: http
  type: ClusterIP
