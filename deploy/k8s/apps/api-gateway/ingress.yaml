# Ingress API Gateway — k3s utilise Traefik par défaut
# Adapter le host selon ton domaine (ex: api.myapp.com)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway
  namespace: myapp
  labels:
    app: api-gateway
spec:
  ingressClassName: traefik
  rules:
    - host: api.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888
