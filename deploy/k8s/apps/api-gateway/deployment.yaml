apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: myapp
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: api-gateway
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: api-gateway
          image: ghcr.io/myapp/backend-api-gateway:6fb44df
          imagePullPolicy: Always
          ports:
            - containerPort: 8888
          env:
            - name: SPRING_APPLICATION_NAME
              value: api-gateway
            - name: SERVER_PORT
              value: "8888"
            - name: SPRING_CLOUD_CONSUL_HOST
              value: consul
            - name: SPRING_CLOUD_CONSUL_PORT
              value: "8500"
            - name: SPRING_CLOUD_CONSUL_DISCOVERY_ENABLED
              value: "true"
            - name: SPRING_CLOUD_CONSUL_DISCOVERY_REGISTER
              value: "true"
            - name: USER_SERVICE_URI
              value: "http://user-management:8081"
            - name: SPRING_REDIS_HOST
              value: redis
            - name: SPRING_REDIS_PORT
              value: "6379"
            - name: FRONTEND_ORIGIN
              value: "http://app.localhost,http://203.0.113.10,http://localhost:3000"
            - name: SPRING_APPLICATION_JSON
              value: '{"spring":{"cloud":{"gateway":{"server":{"webflux":{"globalcors":{"cors-configurations":{"[/**]":{"allowed-origins":["http://app.localhost","http://203.0.113.10","http://localhost:3000"]}}}}}}}}}'
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8888
            initialDelaySeconds: 120
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8888
            initialDelaySeconds: 60
            periodSeconds: 5
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
