apiVersion: apps/v1
kind: Deployment
metadata:
  name: predictions-intake
  namespace: myapp
  labels:
    app: predictions-intake
spec:
  replicas: 1
  selector:
    matchLabels:
      app: predictions-intake
  template:
    metadata:
      labels:
        app: predictions-intake
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: predictions-intake
          image: ghcr.io/myapp/backend-predictions-intake-service:test-ci-predictions
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 5
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
