# Ingress API Gateway — k3s utilise Traefik par défaut
# Adapter le host selon ton domaine (ex: api.myapp.com)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: predictions-intake
  namespace: myapp
  labels:
    app: predictions-intake
spec:
  ingressClassName: traefik
  rules:
    - host: predictions.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: predictions-intake
                port:
                  number: 8082
