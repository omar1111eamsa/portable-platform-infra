# Apps Kustomization — ordre : gateway/frontend → services backend (alphabétique) → ingress
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: myapp

resources:
  # Gateway & Frontend
  - api-gateway/deployment.yaml
  - api-gateway/service.yaml
  - admin-frontend/deployment.yaml
  - admin-frontend/service.yaml
  - frontend/deployment.yaml
  - frontend/service.yaml
  # Backend services (alphabétique)
  # chatbot-credentials: créer manuellement (kubectl create secret generic chatbot-credentials -n myapp --from-literal=LLM_API_KEY=sk-or-xxx ...)
  - chatbot/pvc.yaml
  - chatbot/deployment.yaml
  - chatbot/service.yaml
  - crm-client/deployment.yaml
  - crm-client/service.yaml
  - execution-engine/configmap.yaml
  - execution-engine/deployment.yaml
  - kpi-dashboard/deployment.yaml
  - kpi-dashboard/service.yaml
  - metamodel-orchestration/pvc-modules.yaml
  - metamodel-orchestration/entrypoint-cm.yaml
  - metamodel-orchestration/deployment.yaml
  - metamodel-orchestration/scheduler-deployment.yaml
  - metamodel-orchestration/dag-processor-deployment.yaml
  - metamodel-orchestration/worker-deployment.yaml
  - metamodel-orchestration/triggerer-deployment.yaml
  - metamodel-orchestration/service.yaml
  - metamodel-orchestration/ingress.yaml
  - payment-service/deployment.yaml
  - payment-service/service.yaml
  # pgadmin-credentials: créer manuellement (kubectl create secret generic pgadmin-credentials -n myapp --from-literal=PGADMIN_DEFAULT_EMAIL=... --from-literal=PGADMIN_DEFAULT_PASSWORD=...)
  - pgadmin/deployment.yaml
  - pgadmin/service.yaml
  - pgadmin/middleware-forward-prefix.yaml
  - pgadmin/middleware-strip-prefix.yaml
  - pgadmin/ingress.yaml
  - predictions-intake/deployment.yaml
  - predictions-intake/service.yaml
  - user-management/deployment.yaml
  - user-management/service.yaml
  - user-management/user-service.yaml
  # mail-credentials: créer manuellement (voir DEPLOYMENT.md)
  # Ingress dev.example.com
  - ingress-ip.yaml

# stripe-credentials: kubectl create secret generic stripe-credentials -n myapp ...
