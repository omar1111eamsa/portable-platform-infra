apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-client
  namespace: myapp
  labels:
    app: crm-client
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: crm-client
  template:
    metadata:
      labels:
        app: crm-client
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: frontend-vm
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: crm-client
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: crm-client
          image: ghcr.io/myapp/backend-crm-client:e8a23fc
          imagePullPolicy: Always
          env:
            - name: DB_URL
              value: "jdbc:postgresql://postgres:5432/crm_db"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: SPRING_RABBITMQ_HOST
              value: rabbitmq
            - name: SPRING_RABBITMQ_PORT
              value: "5672"
            - name: SPRING_RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_USERNAME
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_PASSWORD
            - name: SPRING_RABBITMQ_ADDRESSES
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_ADDRESSES
            - name: USER_MANAGEMENT_SERVICE_URL
              value: "http://user-management.myapp.svc.cluster.local:8081"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service.myapp.svc.cluster.local:8083"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SPRING_CLOUD_CONSUL_HOST
              value: consul
            - name: SPRING_CLOUD_CONSUL_PORT
              value: "8500"
            - name: SPRING_CLOUD_CONSUL_DISCOVERY_ENABLED
              value: "true"
            - name: SPRING_CLOUD_CONSUL_DISCOVERY_REGISTER
              value: "true"
            - name: SPRING_CLOUD_CONSUL_DISCOVERY_DEREGISTER
              value: "true"
            - name: SPRING_CLOUD_CONSUL_DISCOVERY_SERVICE_NAME
              value: crmservice
            - name: SPRING_CLOUD_CONSUL_DISCOVERY_PREFER_IP_ADDRESS
              value: "true"
            - name: SPRING_CLOUD_CONSUL_DISCOVERY_IP_ADDRESS
              value: "$(POD_IP)"
            - name: SPRING_CLOUD_CONSUL_DISCOVERY_INSTANCE_ID
              value: "$(POD_NAME)"
            - name: SPRING_CLOUD_CONSUL_DISCOVERY_HEALTH_CHECK_PATH
              value: /actuator/health
            - name: SPRING_CLOUD_CONSUL_DISCOVERY_HEALTH_CHECK_CRITICAL_TIMEOUT
              value: 1m
          ports:
            - containerPort: 8083
          resources:
            requests:
              memory: "256Mi"
              cpu: "120m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          startupProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 90
          livenessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 180
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 90
            periodSeconds: 5
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
