apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-client
  namespace: myapp
  labels:
    app: crm-client
spec:
  replicas: 0  # scaled down until fixed
  selector:
    matchLabels:
      app: crm-client
  template:
    metadata:
      labels:
        app: crm-client
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: crm-client
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: crm-client
          image: ghcr.io/myapp/backend-crm-client:28bf3d4
          imagePullPolicy: Always
          env:
            - name: SPRING_CLOUD_CONSUL_HOST
              value: consul
            - name: SPRING_CLOUD_CONSUL_PORT
              value: "8500"
            - name: SPRING_CLOUD_CONSUL_DISCOVERY_ENABLED
              value: "true"
            - name: SPRING_CLOUD_CONSUL_DISCOVERY_REGISTER
              value: "true"
            - name: SPRING_CLOUD_CONSUL_DISCOVERY_SERVICE_NAME
              value: crmservice
          ports:
            - containerPort: 8083
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 5
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
