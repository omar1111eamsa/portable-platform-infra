apiVersion: apps/v1
kind: Deployment
metadata:
  name: prompttocode
  namespace: myapp
  labels:
    app: prompttocode
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: prompttocode
  template:
    metadata:
      labels:
        app: prompttocode
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: frontend-vm
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: prompttocode
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: prompttocode
          image: ghcr.io/myapp/backend-prompttocode:test-ci
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: APP_ENV
              value: production
            - name: APP_LOG_LEVEL
              value: INFO
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SERVICE_NAME
              value: prompttocode-service
            - name: SERVICE_ID
              value: "$(POD_NAME)"
            - name: SERVICE_ADDRESS
              value: "$(POD_IP)"
            - name: SERVICE_PORT
              value: "8000"
            - name: CONSUL_ENABLED
              value: "true"
            - name: CONSUL_HOST
              value: consul
            - name: CONSUL_PORT
              value: "8500"
            - name: CONSUL_SCHEME
              value: http
            - name: CONSUL_HEALTH_CHECK_PATH
              value: /health
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: chatbot-credentials
                  key: LLM_API_KEY
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 5
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
