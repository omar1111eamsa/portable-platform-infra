apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-builder
  namespace: myapp
  labels:
    app.kubernetes.io/name: portfolio-builder
    app.kubernetes.io/component: pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: portfolio-builder
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portfolio-builder
        app.kubernetes.io/component: pipeline
    spec:
      nodeSelector:
        kubernetes.io/hostname: myapp-worker-02
      containers:
        - name: portfolio-builder
          image: ghcr.io/myapp/metamodel-portfolio-builder:latest
          env:
            - name: DB_HOST
              value: "postgres"
            - name: DB_NAME
              value: "prediction_db"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: RABBITMQ_HOST
              value: "rabbitmq"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_DEFAULT_PASS
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import sys; sys.exit(0)"
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
