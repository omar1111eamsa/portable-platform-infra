apiVersion: apps/v1
kind: Deployment
metadata:
  name: scoring-engine
  namespace: myapp
  labels:
    app: scoring-engine
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: scoring-engine
  template:
    metadata:
      labels:
        app: scoring-engine
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: backend2
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: scoring-engine
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: scoring-engine
          image: ghcr.io/myapp/metamodel-scoring-engine:1de0799
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "8000"
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
