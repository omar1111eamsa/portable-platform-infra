name: Deploy Backend (prod)

on:
  workflow_dispatch: {}

env:
  DEPLOY_PATH_ON_VM: "/opt/portable-platform"  # DEFINED_IN_THE_FUTURE
  COMPOSE_FILE: "deploy/prod/docker-compose.yml"

  PROJECT_ID: "DEFINED_IN_THE_FUTURE"
  GAR_LOCATION: "DEFINED_IN_THE_FUTURE"
  GAR_REPOSITORY: "DEFINED_IN_THE_FUTURE"

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # copy repo content to VM each deploy (simple + reliable)
      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_PRIVATE_KEY }}

      - name: Add VM to known_hosts
        run: |
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync files to VM
        run: |
          rsync -az --delete \
            --exclude ".git" \
            ./ "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:${DEPLOY_PATH_ON_VM}/"

      - name: Deploy via docker compose
        run: |
          ssh "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}" bash -lc "set -euo pipefail
            cd '${DEPLOY_PATH_ON_VM}'
            docker compose -f '${COMPOSE_FILE}' pull
            docker compose -f '${COMPOSE_FILE}' up -d
            docker compose -f '${COMPOSE_FILE}' ps
          "
