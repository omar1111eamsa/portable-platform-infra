name: Cluster Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: cluster-health-check
  cancel-in-progress: false

jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
      GCP_ZONE: ${{ secrets.GCP_ZONE }}
      GCP_INSTANCE: ${{ secrets.GCP_BACKEND_VM }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          set -euo pipefail
          for v in GCP_PROJECT GCP_ZONE GCP_INSTANCE; do
            if [ -z "${!v:-}" ]; then
              echo "::error::$v is not configured"
              exit 1
            fi
          done

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Run health-check on backend VM
        run: |
          set -euo pipefail
          gcloud compute ssh "$GCP_INSTANCE" \
            --project "$GCP_PROJECT" \
            --zone "$GCP_ZONE" \
            --command 'bash -s' \
            < deploy/k8s/scripts/health-check-global.sh | tee health-check.log

      - name: Publish summary
        if: always()
        run: |
          {
            echo "## Cluster Health Check"
            echo
            echo "- Project: \`$GCP_PROJECT\`"
            echo "- Zone: \`$GCP_ZONE\`"
            echo "- VM: \`$GCP_INSTANCE\`"
            echo
            echo '```text'
            cat health-check.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cluster-health-check-log
          path: health-check.log
