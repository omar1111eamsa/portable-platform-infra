name: CI

on:
  push:
    branches: [ main, master, feature/* ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up C++ toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake libpqxx-dev libsodium-dev libhiredis-dev python3 python3-pip docker.io
      - name: Configure
        run: cmake -S user_management_service -B user_management_service/build
      - name: Build
        run: cmake --build user_management_service/build
      - name: Unit tests
        run: ctest --output-on-failure
        working-directory: user_management_service/build
      - name: Docker compose unit tests
        run: |
          docker compose -f user_management_service/docker/docker-compose.yml build user_service user_service_tests
          docker compose -f user_management_service/docker/docker-compose.yml run --rm user_service_tests
      - name: Docker compose integration tests
        run: |
          docker compose -f user_management_service/docker/docker-compose.yml up -d user_service postgres redis
          sleep 5
          docker compose -f user_management_service/docker/docker-compose.yml run --rm integration_tests
          docker compose -f user_management_service/docker/docker-compose.yml down
      - name: Performance smoke
        run: |
          docker compose -f user_management_service/docker/docker-compose.yml up -d user_service postgres redis
          sleep 5
          user_management_service/scripts/perf_smoke.sh SERVICE_URL=http://localhost:8080 CONCURRENCY=3 REQUESTS=30
          docker compose -f user_management_service/docker/docker-compose.yml down
