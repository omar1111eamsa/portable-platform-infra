name: CI

on:
  push:
    branches: [ main, master, feature/* ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libpqxx-dev \
            libsodium-dev \
            libhiredis-dev \
            libssl-dev \
            nlohmann-json3-dev \
            python3 \
            python3-pip

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build

      - name: Unit tests
        working-directory: build
        run: ctest --output-on-failure

      - name: Docker compose unit tests
        run: |
          docker compose -f docker/docker-compose.yml build user_service user_service_tests
          docker compose -f docker/docker-compose.yml run --rm user_service_tests

      - name: Docker compose integration tests
        run: |
          docker compose -f docker/docker-compose.yml up -d user_service postgres redis
          sleep 5
          docker compose -f docker/docker-compose.yml run --rm integration_tests
          docker compose -f docker/docker-compose.yml down

      - name: Performance smoke
        env:
          SERVICE_URL: http://localhost:8080
          CONCURRENCY: "3"
          REQUESTS: "30"
        run: |
          docker compose -f docker/docker-compose.yml up -d user_service postgres redis
          sleep 5
          scripts/perf_smoke.sh
          docker compose -f docker/docker-compose.yml down
